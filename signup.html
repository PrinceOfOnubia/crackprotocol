<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRACK PROTOCOL | Access Gate</title>
<meta name="description" content="Create local access credentials for the Crack Protocol NEO terminal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="terminal-shell">
  <div class="terminal-topbar">
    <a class="brand" href="index.html" aria-label="Crack Protocol home">
      <span>CRACK</span>
      <span>PROTOCOL</span>
      <span class="prompt-mark">&gt;_</span>
    </a>
    <a class="control-btn secondary" href="index.html">Quit / Back Home</a>
  </div>

  <main class="access-wrap">
    <section class="access-panel" aria-labelledby="access-title">
      <p class="page-kicker">// Classified Access Gate</p>
      <h1 id="access-title">Identify Before Terminal Entry</h1>
      <p>Enter a username, password, and wallet address. Address format is checked across common chains; ownership proof will use signatures in a later release.</p>
      <form class="gate-form" id="identityForm">
        <label class="gate-field">
          <span class="gate-label">Username</span>
          <input id="usernameInput" type="text" aria-label="Username" autocomplete="username">
        </label>
        <label class="gate-field">
          <span class="gate-label">Password</span>
          <input id="passwordInput" type="password" aria-label="Password" autocomplete="new-password">
        </label>
        <label class="gate-field">
          <span class="gate-label">Wallet Address</span>
          <input id="walletInput" type="text" aria-label="Wallet address" autocomplete="off">
        </label>
        <div class="gate-error" id="gateError" aria-live="polite"></div>
        <div class="gate-actions">
          <button class="gate-btn" type="submit">Enter NEO Terminal</button>
          <button class="gate-btn secondary" id="loginIdentity" type="button">Login</button>
          <button class="gate-btn secondary" id="clearIdentity" type="button">Clear Identity</button>
        </div>
      </form>
    </section>
  </main>
</div>

<script>
const ID_USER_KEY = "crackprotocol_user";
const ID_WALLET_KEY = "crackprotocol_wallet";
const ID_SESSION_KEY = "crackprotocol_session";

const identityForm = document.getElementById("identityForm");
const usernameInput = document.getElementById("usernameInput");
const passwordInput = document.getElementById("passwordInput");
const walletInput = document.getElementById("walletInput");
const gateError = document.getElementById("gateError");

usernameInput.value = localStorage.getItem(ID_USER_KEY) || "";
walletInput.value = localStorage.getItem(ID_WALLET_KEY) || "";

fetch("/api/health").then((response) => response.json().then((data) => ({ response, data }))).then(({ response, data }) => {
  if (!response.ok || !data.ok) gateError.textContent = "Storage is not configured. Add Upstash Redis env vars in Vercel.";
}).catch(() => {
  gateError.textContent = "Access service unavailable.";
});

identityForm.addEventListener("submit", function(event) {
  event.preventDefault();
  authenticate("register");
});

document.getElementById("loginIdentity").addEventListener("click", function() {
  authenticate("login");
});

document.getElementById("clearIdentity").addEventListener("click", function() {
  localStorage.removeItem(ID_USER_KEY);
  localStorage.removeItem(ID_WALLET_KEY);
  localStorage.removeItem(ID_SESSION_KEY);
  usernameInput.value = "";
  passwordInput.value = "";
  walletInput.value = "";
  gateError.textContent = "Identity cleared.";
  usernameInput.focus();
});

async function authenticate(mode) {
  const nextUser = usernameInput.value.trim();
  const nextPassword = passwordInput.value.trim();
  const nextWallet = walletInput.value.trim();

  if ((mode === "register" && !nextUser) || !nextPassword || !nextWallet) {
    gateError.textContent = "Username, password, and wallet address are required.";
    return;
  }

  gateError.textContent = mode === "register" ? "Creating access session..." : "Opening access session...";
  try {
    const response = await fetch(`/api/auth/${mode}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: nextUser, password: nextPassword, walletAddress: nextWallet })
    });
    const data = await response.json();
    if (mode === "register" && response.status === 409 && data.code === "WALLET_REGISTERED") {
      return authenticate("login");
    }
    if (!response.ok) {
      gateError.textContent = data.error || "Access rejected.";
      return;
    }
    localStorage.setItem(ID_USER_KEY, data.user.username);
    localStorage.setItem(ID_WALLET_KEY, data.user.walletAddress);
    localStorage.setItem(ID_SESSION_KEY, data.user.sessionId);
    passwordInput.value = "";
    window.location.href = "terminal.html";
  } catch (error) {
    gateError.textContent = "Access service unavailable.";
  }
}
</script>
</body>
</html>
