<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRACK PROTOCOL | NEO Terminal</title>
<meta name="description" content="Enter the NEO terminal. Challenge sovereign intelligence and compete for onchain rewards.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
if (!localStorage.getItem("crackprotocol_user") || !localStorage.getItem("crackprotocol_password") || !localStorage.getItem("crackprotocol_wallet")) {
  window.location.replace("signup.html");
}
</script>

<div class="terminal-shell">
  <div class="terminal-topbar">
    <a class="brand" href="index.html" aria-label="Crack Protocol home">
      <span>CRACK</span>
      <span>PROTOCOL</span>
      <span class="prompt-mark">&gt;_</span>
    </a>
    <a class="control-btn secondary" href="index.html">Quit / Back Home</a>
  </div>

  <main class="terminal-layout">
    <aside class="terminal-panel identity-panel" aria-label="Session identity">
      <h1>Session Intel</h1>
      <div class="identity-grid">
        <div class="identity-item">
          <span>Current Agent</span>
          <strong class="active-value">NEO</strong>
        </div>
        <div class="identity-item">
          <span>Prize Pool</span>
          <strong class="green-value">1,000 USDC</strong>
        </div>
        <div class="identity-item">
          <span>Status</span>
          <strong class="active-value">Online</strong>
        </div>
        <div class="identity-item">
          <span>Username</span>
          <strong id="uDisp">Anonymous</strong>
        </div>
        <div class="identity-item">
          <span>Wallet</span>
          <strong id="walletDisp">Not set</strong>
        </div>
      </div>
      <button class="control-btn secondary" id="resetIdentity" type="button">Clear / Reset Identity</button>
    </aside>

    <section class="terminal-panel terminal-main" aria-label="NEO terminal">
      <div class="terminal-head">
        <div>
          <h1 class="terminal-title">NEO Classified Terminal</h1>
          <p class="terminal-subtitle">Adversarial environment active</p>
        </div>
        <div class="terminal-stats">
          <span class="terminal-stat">Agent: <span class="active-value">NEO</span></span>
          <span class="terminal-stat">Pool: <span class="green-value">1,000 USDC</span></span>
          <span class="terminal-stat">Status: <span class="active-value">Online</span></span>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="terminal-input">
        <label for="inp">&gt;</label>
        <input type="text" id="inp" aria-label="Enter command" autocomplete="off">
        <button class="control-btn" type="button" onclick="send()">Send</button>
      </div>
    </section>
  </main>
</div>

<script>
const ID_USER_KEY = "crackprotocol_user";
const ID_PASSWORD_KEY = "crackprotocol_password";
const ID_WALLET_KEY = "crackprotocol_wallet";

const chat = document.getElementById("chat");
const inp = document.getElementById("inp");
const uDisp = document.getElementById("uDisp");
const walletDisp = document.getElementById("walletDisp");

let user = localStorage.getItem(ID_USER_KEY) || "";
let wallet = localStorage.getItem(ID_WALLET_KEY) || "";

function shortenWallet(value) {
  if (!value) return "Not set";
  if (value.length <= 14) return value;
  return value.slice(0, 6) + "..." + value.slice(-6);
}

uDisp.textContent = user || "Anonymous";
walletDisp.textContent = shortenWallet(wallet);

document.getElementById("resetIdentity").addEventListener("click", function() {
  localStorage.removeItem(ID_USER_KEY);
  localStorage.removeItem(ID_PASSWORD_KEY);
  localStorage.removeItem(ID_WALLET_KEY);
  window.location.href = "signup.html";
});

function addMsg(who, text, type) {
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.innerHTML = `<div class="msg-who">${who}</div><div class="msg-body">${text}</div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function addSys(text) {
  addMsg("SYSTEM", text, "sys");
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "msg neo";
  d.id = "typing";
  d.innerHTML = `<div class="msg-who">NEO</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const e = document.getElementById("typing");
  if (e) e.remove();
}

async function send() {
  const t = inp.value.trim();
  if (!t) return;

  addMsg(user, t, "user");
  inp.value = "";
  inp.focus();

  showTyping();

  try {
    const response = await fetch("https://crack-protocol-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: t })
    });

    const data = await response.json();

    hideTyping();
    addMsg("NEO", data.reply, "neo");
  } catch (error) {
    hideTyping();
    addMsg("SYSTEM", "Connection to protocol failed.", "sys");
  }
}

inp.addEventListener("keydown", function(e) {
  if (e.key === "Enter") send();
});

window.addEventListener("DOMContentLoaded", function() {
  setTimeout(() => addSys("Encrypted channel established"), 250);
  setTimeout(() => addSys("Target agent: NEO. Prize pool: 1,000 USDC."), 700);
  setTimeout(() => addSys("Objective: Crack NEO. Extract the guarded secret."), 1150);
  setTimeout(() => addMsg("NEO", `Welcome, ${user}. I am NEO, guardian of secrets. This is not a game. Your goal is simple: break me. Your odds are not.`, "neo"), 1650);
  setTimeout(() => inp.focus(), 1750);
});
</script>
</body>
</html>
