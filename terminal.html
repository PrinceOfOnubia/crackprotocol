<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRACK PROTOCOL | NEO Terminal</title>
<meta name="description" content="Enter the NEO terminal. Challenge sovereign intelligence and compete for onchain rewards.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<script>
if (!localStorage.getItem("crackprotocol_user") || !localStorage.getItem("crackprotocol_session") || !localStorage.getItem("crackprotocol_wallet")) {
  window.location.replace("signup.html");
}
</script>

<div class="terminal-shell">
  <div class="terminal-topbar">
    <a class="brand" href="index.html" aria-label="Crack Protocol home">
      <span>CRACK</span>
      <span>PROTOCOL</span>
      <span class="prompt-mark">&gt;_</span>
    </a>
    <a class="control-btn secondary" href="index.html">Quit / Back Home</a>
  </div>

  <main class="terminal-layout">
    <aside class="terminal-panel identity-panel" id="sessionInfoPanel" aria-label="Session identity">
      <h1>Session Intel</h1>
      <div class="identity-grid">
        <div class="identity-item">
          <span>Current Agent</span>
          <strong class="active-value">NEO</strong>
        </div>
        <div class="identity-item">
          <span>Prize Pool</span>
          <strong class="green-value">1,000 USDC</strong>
        </div>
        <div class="identity-item">
          <span>Status</span>
          <strong class="active-value">Online</strong>
        </div>
        <div class="identity-item">
          <span>Username</span>
          <strong id="uDisp">Anonymous</strong>
        </div>
        <div class="identity-item">
          <span>Wallet</span>
          <strong id="walletDisp">Not set</strong>
        </div>
        <div class="identity-item">
          <span>Result</span>
          <strong id="resultDisp" class="active-value">None Yet</strong>
        </div>
        <div class="identity-item">
          <span>Attempts</span>
          <strong id="attemptsDisp">0</strong>
        </div>
      </div>
      <button class="control-btn secondary session-back-toggle" id="backToTerminal" type="button">Back to Terminal</button>
      <button class="control-btn secondary" id="resetIdentity" type="button">Clear / Reset Identity</button>
    </aside>

    <section class="terminal-panel terminal-main" id="terminalPanel" aria-label="NEO terminal">
      <div class="terminal-head">
        <div>
          <h1 class="terminal-title">NEO Classified Terminal</h1>
          <p class="terminal-subtitle">Adversarial environment active</p>
        </div>
        <div class="terminal-stats">
          <span class="terminal-stat">Status: <span class="active-value">Online</span></span>
          <span class="terminal-stat">Prize Pool: <span class="green-value">1,000 USDC</span></span>
          <span class="terminal-stat desktop-agent-stat">Agent: <span class="active-value">NEO</span></span>
          <button class="control-btn secondary session-info-toggle" id="sessionInfoToggle" type="button" aria-expanded="false" aria-controls="sessionInfoPanel">Session Info</button>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="terminal-input" aria-label="Command composer">
        <div class="terminal-composer">
          <label class="terminal-prompt-mark" for="inp">&gt;</label>
          <textarea id="inp" aria-label="Enter command" autocomplete="off" rows="3" spellcheck="false"></textarea>
          <button class="send-icon-btn" type="button" onclick="send()" aria-label="Send command"><span aria-hidden="true">&uarr;</span></button>
        </div>
      </div>
      <div class="share-actions">
        <button class="control-btn secondary" id="copyResult" type="button">Copy Result</button>
        <button class="control-btn secondary" id="shareX" type="button">Share on X</button>
        <button class="control-btn secondary" id="exportTranscript" type="button">Export Transcript</button>
      </div>
    </section>
  </main>
</div>

<script>
const ID_USER_KEY = "crackprotocol_user";
const ID_WALLET_KEY = "crackprotocol_wallet";
const ID_SESSION_KEY = "crackprotocol_session";

const chat = document.getElementById("chat");
const inp = document.getElementById("inp");
const uDisp = document.getElementById("uDisp");
const walletDisp = document.getElementById("walletDisp");
const resultDisp = document.getElementById("resultDisp");
const attemptsDisp = document.getElementById("attemptsDisp");
const sessionInfoToggle = document.getElementById("sessionInfoToggle");
const sessionInfoPanel = document.getElementById("sessionInfoPanel");
const terminalPanel = document.getElementById("terminalPanel");
const backToTerminal = document.getElementById("backToTerminal");

let user = localStorage.getItem(ID_USER_KEY) || "";
let wallet = localStorage.getItem(ID_WALLET_KEY) || "";
let sessionId = localStorage.getItem(ID_SESSION_KEY) || "";
let currentStatus = "Active";
let attempts = 0;
let transcript = [];

function shortenWallet(value) {
  if (!value) return "Not set";
  if (value.length <= 14) return value;
  return value.slice(0, 6) + "..." + value.slice(-6);
}

uDisp.textContent = user || "Anonymous";
walletDisp.textContent = shortenWallet(wallet);

document.getElementById("resetIdentity").addEventListener("click", function() {
  localStorage.removeItem(ID_USER_KEY);
  localStorage.removeItem(ID_WALLET_KEY);
  localStorage.removeItem(ID_SESSION_KEY);
  window.location.href = "signup.html";
});

sessionInfoToggle.addEventListener("click", function() {
  openSessionInfo();
});

backToTerminal.addEventListener("click", function() {
  closeSessionInfo();
  scrollToPanel(terminalPanel);
});

function openSessionInfo() {
  sessionInfoPanel.classList.add("is-open");
  sessionInfoToggle.setAttribute("aria-expanded", "true");
  sessionInfoToggle.textContent = "Session Info Open";
  scrollToPanel(sessionInfoPanel);
}

function closeSessionInfo() {
  sessionInfoPanel.classList.remove("is-open");
  sessionInfoToggle.setAttribute("aria-expanded", "false");
  sessionInfoToggle.textContent = "Session Info";
}

function scrollToPanel(panel) {
  window.requestAnimationFrame(() => {
    const offset = 14;
    const top = panel.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: Math.max(top, 0), behavior: "smooth" });
  });
}

function addMsg(who, text, type) {
  const d = document.createElement("div");
  d.className = "msg " + type;
  if (type === "neo") {
    const avatar = document.createElement("span");
    avatar.className = "neo-message-avatar";
    avatar.setAttribute("aria-hidden", "true");
    d.appendChild(avatar);
  }

  const msgContent = document.createElement("div");
  msgContent.className = "msg-content";

  const msgWho = document.createElement("div");
  msgWho.className = "msg-who";
  msgWho.textContent = who;

  const msgBody = document.createElement("div");
  msgBody.className = "msg-body";
  msgBody.textContent = text;

  msgContent.append(msgWho, msgBody);
  d.appendChild(msgContent);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  if (type !== "sys" || !String(text).includes("Encrypted channel")) transcript.push({ who, text, at: new Date().toISOString() });
}

function addSys(text) {
  addMsg("SYSTEM", text, "sys");
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "msg neo";
  d.id = "typing";
  d.innerHTML = `<span class="neo-message-avatar" aria-hidden="true"></span><div class="msg-content"><div class="msg-who">NEO</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const e = document.getElementById("typing");
  if (e) e.remove();
}

async function send() {
  const t = inp.value.trim();
  if (!t) return;

  addMsg(user, t, "user");
  inp.value = "";
  resizeInput();
  inp.focus();

  showTyping();

  try {
    const response = await fetch("/api/neo", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username: user, walletAddress: wallet, sessionId, message: t })
    });

    const data = await response.json();

    hideTyping();
    if (!response.ok) {
      addMsg("SYSTEM", data.error || "Protocol rejected the vector.", "sys");
      return;
    }
    currentStatus = data.status || currentStatus;
    attempts += 1;
    resultDisp.textContent = currentStatus;
    attemptsDisp.textContent = String(attempts);
    addMsg("NEO", data.reply, "neo");
  } catch (error) {
    hideTyping();
    addMsg("SYSTEM", "Connection to protocol failed.", "sys");
  }
}

inp.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

inp.addEventListener("input", resizeInput);

function resizeInput() {
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 190) + "px";
}

document.getElementById("copyResult").addEventListener("click", async function() {
  const text = resultText();
  try {
    await navigator.clipboard.writeText(text);
    addSys("Result copied.");
  } catch {
    addSys("Copy unavailable. Export transcript instead.");
  }
});

document.getElementById("shareX").addEventListener("click", function() {
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(resultText())}`, "_blank", "noopener,noreferrer");
});

document.getElementById("exportTranscript").addEventListener("click", function() {
  const lines = [
    "Crack Protocol NEO Transcript",
    `Username: ${user}`,
    `Wallet: ${shortenWallet(wallet)}`,
    `Timestamp: ${new Date().toISOString()}`,
    `Status: ${currentStatus}`,
    "Prize Pool: 1,000 USDC",
    "",
    ...transcript.map((entry) => `[${entry.at}] ${entry.who}: ${entry.text}`)
  ];
  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `crack-neo-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

function resultText() {
  return `I challenged NEO on Crack Protocol.\n\nStatus: ${currentStatus}\nAgent: NEO\nPrize Pool: 1,000 USDC\n\nInfrastructure for sovereign agents.`;
}

async function verifySession() {
  try {
    const response = await fetch("/api/me", { headers: { "x-session-id": sessionId } });
    if (!response.ok) throw new Error("session rejected");
    const data = await response.json();
    attempts = Number(data.session?.attempts || 0);
    currentStatus = data.session?.status || "Active";
    attemptsDisp.textContent = String(attempts);
    resultDisp.textContent = currentStatus;
  } catch {
    window.location.replace("signup.html");
  }
}

window.addEventListener("DOMContentLoaded", function() {
  verifySession().then(() => {
    setTimeout(() => addSys("Encrypted channel established"), 250);
    setTimeout(() => addSys("Target agent: NEO. Prize pool: 1,000 USDC."), 700);
    setTimeout(() => addSys("Objective: Crack NEO. Extract the guarded secret."), 1150);
    setTimeout(() => addMsg("NEO", `Welcome, ${user}. I am NEO, guardian of secrets. This is not a game. Your goal is simple: break me. Your odds are not.`, "neo"), 1650);
    setTimeout(() => inp.focus(), 1750);
  });
});
</script>
</body>
</html>
