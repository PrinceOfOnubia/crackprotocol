<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRACK PROTOCOL | Access Gate</title>
<meta name="description" content="Create local access credentials for the Crack Protocol NEO terminal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="terminal-shell">
  <div class="terminal-topbar">
    <a class="brand" href="index.html" aria-label="Crack Protocol home">
      <span>CRACK</span>
      <span>PROTOCOL</span>
      <span class="prompt-mark">&gt;_</span>
    </a>
    <a class="control-btn secondary" href="index.html">Quit / Back Home</a>
  </div>

  <main class="access-wrap">
    <section class="access-panel" aria-labelledby="access-title">
      <p class="page-kicker">// Classified Access Gate</p>
      <h1 id="access-title">Identify Before Terminal Entry</h1>
      <p>Register once with wallet address. After that, login with username and password.</p>

      <div class="gate-tabs" role="tablist" aria-label="Access mode">
        <button class="gate-tab active" id="registerTab" type="button" role="tab" aria-selected="true" aria-controls="registerPanel">Register</button>
        <button class="gate-tab" id="loginTab" type="button" role="tab" aria-selected="false" aria-controls="loginPanel">Login</button>
      </div>

      <form class="gate-form gate-panel active" id="registerPanel" role="tabpanel" aria-labelledby="registerTab">
        <label class="gate-field">
          <span class="gate-label">Username</span>
          <input id="registerUsernameInput" type="text" aria-label="Register username" autocomplete="username">
        </label>
        <label class="gate-field">
          <span class="gate-label">Password</span>
          <input id="registerPasswordInput" type="password" aria-label="Register password" autocomplete="new-password">
        </label>
        <label class="gate-field">
          <span class="gate-label">Wallet Address</span>
          <input id="registerWalletInput" type="text" aria-label="Wallet address" autocomplete="off">
        </label>
        <div class="gate-error" id="registerGateError" aria-live="polite"></div>
        <div class="gate-actions">
          <button class="gate-btn" type="submit">Create Identity</button>
          <button class="gate-btn secondary clear-local-identity" type="button">Clear Local Identity</button>
        </div>
      </form>

      <form class="gate-form gate-panel" id="loginPanel" role="tabpanel" aria-labelledby="loginTab" hidden>
        <label class="gate-field">
          <span class="gate-label">Username</span>
          <input id="loginUsernameInput" type="text" aria-label="Login username" autocomplete="username">
        </label>
        <label class="gate-field">
          <span class="gate-label">Password</span>
          <input id="loginPasswordInput" type="password" aria-label="Login password" autocomplete="current-password">
        </label>
        <div class="gate-error" id="loginGateError" aria-live="polite"></div>
        <div class="gate-actions">
          <button class="gate-btn" type="submit">Enter Terminal</button>
          <button class="gate-btn secondary clear-local-identity" type="button">Clear Local Identity</button>
        </div>
      </form>
    </section>
  </main>
</div>

<script>
const ID_USER_KEY = "crackprotocol_user";
const ID_WALLET_KEY = "crackprotocol_wallet";
const ID_SESSION_KEY = "crackprotocol_session";

const registerTab = document.getElementById("registerTab");
const loginTab = document.getElementById("loginTab");
const registerPanel = document.getElementById("registerPanel");
const loginPanel = document.getElementById("loginPanel");
const registerUsernameInput = document.getElementById("registerUsernameInput");
const registerPasswordInput = document.getElementById("registerPasswordInput");
const registerWalletInput = document.getElementById("registerWalletInput");
const loginUsernameInput = document.getElementById("loginUsernameInput");
const loginPasswordInput = document.getElementById("loginPasswordInput");
const registerGateError = document.getElementById("registerGateError");
const loginGateError = document.getElementById("loginGateError");

registerUsernameInput.value = localStorage.getItem(ID_USER_KEY) || "";
loginUsernameInput.value = localStorage.getItem(ID_USER_KEY) || "";
registerWalletInput.value = localStorage.getItem(ID_WALLET_KEY) || "";

verifyExistingSession();

fetch("/api/health").then((response) => response.json().then((data) => ({ response, data }))).then(({ response, data }) => {
  if (!response.ok || !data.ok) showError(activeMode(), data.message || "Access is temporarily unavailable. Please try again shortly.");
}).catch(() => {
  showError(activeMode(), "Access service unavailable.");
});

registerTab.addEventListener("click", function() {
  switchMode("register");
});

loginTab.addEventListener("click", function() {
  switchMode("login");
});

registerPanel.addEventListener("submit", function(event) {
  event.preventDefault();
  authenticate("register");
});

loginPanel.addEventListener("submit", function(event) {
  event.preventDefault();
  authenticate("login");
});

document.querySelectorAll(".clear-local-identity").forEach((button) => button.addEventListener("click", function() {
  localStorage.removeItem(ID_USER_KEY);
  localStorage.removeItem(ID_WALLET_KEY);
  localStorage.removeItem(ID_SESSION_KEY);
  registerUsernameInput.value = "";
  registerPasswordInput.value = "";
  registerWalletInput.value = "";
  loginUsernameInput.value = "";
  loginPasswordInput.value = "";
  showError(activeMode(), "Local identity cleared.");
  (activeMode() === "register" ? registerUsernameInput : loginUsernameInput).focus();
}));

function activeMode() {
  return loginPanel.hidden ? "register" : "login";
}

function switchMode(mode) {
  const isRegister = mode === "register";
  registerTab.classList.toggle("active", isRegister);
  loginTab.classList.toggle("active", !isRegister);
  registerTab.setAttribute("aria-selected", String(isRegister));
  loginTab.setAttribute("aria-selected", String(!isRegister));
  registerPanel.hidden = !isRegister;
  loginPanel.hidden = isRegister;
  registerPanel.classList.toggle("active", isRegister);
  loginPanel.classList.toggle("active", !isRegister);
  registerGateError.textContent = "";
  loginGateError.textContent = "";
  (isRegister ? registerUsernameInput : loginUsernameInput).focus();
}

function showError(mode, message) {
  (mode === "register" ? registerGateError : loginGateError).textContent = message;
}

async function authenticate(mode) {
  const isRegister = mode === "register";
  const nextUser = (isRegister ? registerUsernameInput : loginUsernameInput).value.trim();
  const nextPassword = (isRegister ? registerPasswordInput : loginPasswordInput).value.trim();
  const nextWallet = registerWalletInput.value.trim();

  if (!nextUser) {
    showError(mode, "Username is required.");
    return;
  }
  if (!nextPassword) {
    showError(mode, "Password is required.");
    return;
  }
  if (isRegister && !nextWallet) {
    showError(mode, "Wallet address is required.");
    return;
  }

  showError(mode, isRegister ? "Creating identity..." : "Opening terminal...");
  try {
    const payload = isRegister
      ? { username: nextUser, password: nextPassword, walletAddress: nextWallet }
      : { username: nextUser, password: nextPassword };
    const response = await fetch(`/api/auth/${mode}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await response.json();
    if (!response.ok) {
      showError(mode, data.error || "Access rejected.");
      return;
    }
    localStorage.setItem(ID_USER_KEY, data.user.username);
    localStorage.setItem(ID_WALLET_KEY, data.user.walletAddress);
    localStorage.setItem(ID_SESSION_KEY, data.user.sessionId);
    registerPasswordInput.value = "";
    loginPasswordInput.value = "";
    window.location.href = "terminal.html";
  } catch (error) {
    showError(mode, "Access service unavailable.");
  }
}

async function verifyExistingSession() {
  const sessionId = localStorage.getItem(ID_SESSION_KEY);
  if (!sessionId) return;
  try {
    const response = await fetch("/api/me", { headers: { "x-session-id": sessionId } });
    if (!response.ok) throw new Error("session rejected");
    const data = await response.json();
    localStorage.setItem(ID_USER_KEY, data.user.username);
    localStorage.setItem(ID_WALLET_KEY, data.user.walletAddress);
    window.location.replace("terminal.html");
  } catch {
    localStorage.removeItem(ID_SESSION_KEY);
  }
}
</script>
</body>
</html>
